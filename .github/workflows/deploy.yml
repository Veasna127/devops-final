name: Deploy to Docker

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy with Docker
        run: |
          docker build -t docker-test .
          docker stop website || true
          docker run -d --rm -p 80:80 --name website docker-test