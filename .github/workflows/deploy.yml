name: Deploy to Docker

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy with Docker
        shell: powershell
        run: |
          docker build -t my-website .
          docker stop website
          if ($LASTEXITCODE -ne 0) { Write-Host "No container to stop, continuing..." }
          docker run -d --rm -p 80:80 --name website my-website